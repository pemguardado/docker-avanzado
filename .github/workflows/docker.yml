name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    name: Build, Push and Deploy Container
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag pemguardado/websiteplatzi:latest \
            -f CI/Dockerfile .

      - name: Push Docker image
        run: |
          docker push pemguardado/websiteplatzi:latest

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: patswebapp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: index.docker.io/pemguardado/websiteplatzi:latest
